name: Build RASOrbit Viewer (Tauri)

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write   # required for tauri-action to create/update releases and upload assets
    strategy:
      fail-fast: false
      matrix:
        platform: [ macos-latest, windows-latest, ubuntu-latest ]

    runs-on: ${{ matrix.platform }}
    environment: signing

    env:
      # Speed up Rust builds
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-C debuginfo=0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v pkg-config >/dev/null 2>&1; then
            brew update
            brew install pkg-config
          fi

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      # Import Apple cert with a dedicated action (avoids SecKeychainItemImport "parameters not valid" from tauri-action's import)
      - name: Import Apple code signing certificate (macOS, tag builds)
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # Azure signing interface
      - name: Install Trusted Signing CLI
        if: matrix.platform == 'windows-latest'
        run: cargo install trusted-signing-cli

      # tauri-action builds installers and uploads to the draft release on tag builds (NSIS on Windows, DMG on macOS, AppImage on Linux).
      # Do NOT set APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD here — cert is already in keychain from the step above.
      # If they are set (even empty), Tauri's bundler runs "security import" and hits SecKeychainItemImport errors.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseDraft: true
          prerelease: false
          # macOS non-tag: build without signing so CI works without cert. DMG (not .app) so CI artifacts are a single native file (upload-artifact archive:false).
          args: ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || (matrix.platform == 'macos-latest' && (startsWith(github.ref, 'refs/tags/') && '--bundles dmg' || '--bundles dmg --no-sign') || '--bundles appimage') }}

      # One installer file per job with archive:false — downloads keep .dmg / .exe / .AppImage instead of a .tar.gz of the whole bundle tree.
      - name: Upload macOS installer
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          path: src-tauri/target/release/bundle/dmg/*.dmg
          archive: false
          if-no-files-found: error

      - name: Upload Windows installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          path: src-tauri/target/release/bundle/nsis/*.exe
          archive: false
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          archive: false
          if-no-files-found: error

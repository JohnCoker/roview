name: Build RASOrbit Viewer (Tauri)

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write   # required for tauri-action to create/update releases and upload assets
    strategy:
      fail-fast: false
      matrix:
        platform: [ macos-latest, windows-latest, ubuntu-latest ]

    runs-on: ${{ matrix.platform }}
    environment: signing

    env:
      # Speed up Rust builds
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-C debuginfo=0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      # macOS/Linux: tauri-action builds and uploads to release (expects bundle output)
      - name: Build Tauri app (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ (matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')) && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--bundles app' || '--bundles appimage' }}

      # Windows: tauri-action only looks for msi/nsis; we want the raw .exe so build and upload manually
      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build -- --no-bundle

      - name: Upload Windows exe to release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/roview.exe
          draft: true
          fail_on_unmatched_files: true

      # Windows puts output in target/release/; macOS/Linux use target/release/bundle/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roview-${{ matrix.platform == 'macos-latest' && 'macos' || (matrix.platform == 'windows-latest' && 'windows' || 'linux') }}
          path: ${{ matrix.platform == 'windows-latest' && 'src-tauri/target/release' || 'src-tauri/target/release/bundle' }}
